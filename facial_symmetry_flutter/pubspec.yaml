name: facial_symmetry_flutter
description: "Facial symmetry analysis tool using MediaPipe and Sunnybrook scoring"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management (Bloc - same as Dr. Copilot)
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.4.1
  
  # Camera & MediaPipe
  camera: ^0.10.5
  kwon_mediapipe_landmarker: ^0.0.2
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Data Persistence
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # PDF Generation
  pdf: ^3.11.0
  printing: ^5.12.0
  
  # Utilities
  intl: ^0.19.0
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  cupertino_icons: ^1.0.8
  camera_windows: ^0.2.6+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  
  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
