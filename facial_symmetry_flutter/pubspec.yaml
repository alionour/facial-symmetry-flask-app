name: facial_symmetry_flutter
description: "Facial symmetry analysis tool using MediaPipe and Sunnybrook scoring"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management (Bloc - same as Dr. Copilot)
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^3.0.0
  
  # Camera & MediaPipe
  camera: ^0.12.0+1
  kwon_mediapipe_landmarker: ^0.0.2
  
  # Permissions
  permission_handler: ^12.0.1
  
  # Data Persistence
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # PDF Generation
  pdf: ^3.11.0
  printing: ^5.12.0
  
  # Utilities
  intl: ^0.20.2
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  cupertino_icons: ^1.0.8
  camera_windows: ^0.2.6+4
  image: ^4.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  
  # Code Generation
  build_runner: ^2.4.8
  injectable_generator: ^3.0.2
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  
  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
